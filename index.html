<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet & Fuel Logistics Manager</title>
  
    <script>
      const originalError = console.error;
      console.error = (...args) => {
        if (args[0] && typeof args[0] === 'string' && (args[0].includes('WebSocket') || args[0].includes('vite'))) return;
        originalError.call(console, ...args);
      };
      const originalWarn = console.warn;
      console.warn = (...args) => {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('width(-1) and height(-1)')) return;
        originalWarn.call(console, ...args);
      };
      window.addEventListener('unhandledrejection', (event) => {
        if (event.reason && event.reason.message && event.reason.message.includes('WebSocket')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
      window.addEventListener('error', (event) => {
        if (event.message && event.message.includes('WebSocket')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
